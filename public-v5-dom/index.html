<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>不完美作战 v5.1 DOM</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
    width:100%;height:100%;
    min-height:100vh;min-height:100dvh;
    overflow:hidden;
    position:fixed;top:0;left:0;
}
body{
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    background:#0a0a1a;color:#fff;
    -webkit-tap-highlight-color:transparent;
    user-select:none;-webkit-user-select:none;
    touch-action:manipulation;
    padding:env(safe-area-inset-top, 0) env(safe-area-inset-right, 0) env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
}

/* === Start Screen === */
#start-screen{
    position:fixed;top:0;left:0;right:0;bottom:0;
    width:100%;height:100%;height:100dvh;
    background:linear-gradient(135deg,#0a0a1a 0%,#1a1a3a 50%,#0a0a1a 100%);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    z-index:1000;transition:opacity 0.4s;
}
#start-screen.hidden{opacity:0;pointer-events:none}
.game-title{
    font-size:clamp(28px,8vw,42px);font-weight:900;
    background:linear-gradient(135deg,#00d4ff,#8b5cf6,#ff69b4);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    margin-bottom:4px;letter-spacing:2px;
}
.game-subtitle{font-size:13px;color:rgba(255,255,255,0.4);margin-bottom:8px}
.version-tag{padding:2px 10px;border-radius:10px;font-size:10px;background:rgba(139,92,246,0.2);color:#8b5cf6;border:1px solid rgba(139,92,246,0.3);margin-bottom:20px}

/* Difficulty */
.diff-section{background:rgba(255,255,255,0.04);border-radius:16px;padding:16px 12px;border:1px solid rgba(255,255,255,0.08);margin-bottom:12px;width:min(380px,92vw);text-align:center}
.diff-label{font-size:14px;color:rgba(255,255,255,0.6);margin-bottom:10px;letter-spacing:1px}
.diff-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px}
.diff-btn{padding:12px 0;border-radius:8px;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.7);font-size:12px;cursor:pointer;transition:all 0.15s;min-height:44px;display:flex;align-items:center;justify-content:center}
.diff-btn:active,.diff-btn.selected{background:rgba(0,212,255,0.2);border-color:#00d4ff;color:#00d4ff}
.diff-desc{margin-top:8px;font-size:11px;color:rgba(255,255,255,0.35)}

/* Hero */
.hero-section{background:rgba(255,255,255,0.04);border-radius:16px;padding:14px 12px;border:1px solid rgba(255,255,255,0.08);margin-bottom:12px;width:min(380px,92vw)}
.hero-section .diff-label{display:block;text-align:center}
.hero-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:8px}
.hero-card{padding:14px 10px;border-radius:12px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.02);cursor:pointer;text-align:center;transition:all 0.2s;min-height:88px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.hero-card:active,.hero-card.selected{border-color:#00d4ff;background:rgba(0,212,255,0.1)}
.hero-card.selected{box-shadow:0 0 16px rgba(0,212,255,0.25)}
.hero-card-icon{font-size:32px;margin-bottom:4px;line-height:1}
.hero-card-name{font-size:14px;font-weight:bold;margin-bottom:2px}
.hero-card-type{font-size:10px;color:rgba(255,255,255,0.35)}
.hero-card-desc{font-size:10px;color:rgba(255,255,255,0.5);margin-top:4px;line-height:1.3}

.start-btn{
    padding:14px 56px;border-radius:14px;min-height:52px;width:min(320px,80vw);
    border:none;background:linear-gradient(135deg,#8b5cf6,#00d4ff);
    color:#fff;font-size:18px;font-weight:bold;cursor:pointer;
    transition:transform 0.15s;letter-spacing:1px;
}
.start-btn:active{transform:scale(0.96)}
.start-btn:disabled{opacity:0.35;transform:none}

/* Game Container */
#game-container{
    position:fixed;top:0;left:0;right:0;bottom:0;
    width:100%;height:100%;height:100dvh;
    display:none;background:#0a0a1a;overflow:hidden;
}
#game-container.active{display:block}
#game-canvas{display:block;touch-action:none;image-rendering:pixelated;image-rendering:crisp-edges}
</style>

<!-- DOM Overlay CSS -->
<link rel="stylesheet" href="overlay-v1.css">

</head>
<body>

<!-- Start Screen -->
<div id="start-screen">
    <h1 class="game-title">不完美作战</h1>
    <p class="game-subtitle">IMPERFECT COMBAT</p>
    <span class="version-tag">v5.1 DOM</span>

    <div class="diff-section">
        <div class="diff-label">🎯 选择难度</div>
        <div class="diff-grid" id="diff-grid"></div>
        <div class="diff-desc" id="diff-desc">怪物血量 ×1.0 | 怪物速度 ×1.0</div>
    </div>

    <div class="hero-section">
        <div class="diff-label">⚔️ 选择英雄</div>
        <div class="hero-grid" id="hero-grid"></div>
    </div>

    <button class="start-btn" id="start-btn" disabled>选择英雄后开始</button>
</div>

<!-- Game Container -->
<div id="game-container">
    <canvas id="game-canvas"></canvas>

    <!-- ===== DOM Overlay (on top of canvas) ===== -->
    <div id="game-ui-overlay">
        <!-- HUD -->
        <div id="hud" class="ui-interactive">
            <div id="hud-left">
                <div id="hp-container"><div id="hp-fill"></div><span id="hp-text">❤ 60/60</span></div>
                <div id="mp-container"><div id="mp-fill"></div><span id="mp-text">💎 0</span></div>
            </div>
            <div id="hud-right">
                <span id="wave-text">⚔ 1-1</span>
                <span id="gold-text">💰0</span>
                <span id="kills-text">💀0 (0/5)</span>
            </div>
            <div id="hud-btns">
                <button id="btn-pause">⏸</button>
                <button id="btn-blueprint">📋</button>
            </div>
        </div>

        <!-- Bottom Panel -->
        <div id="bottom-panel" class="ui-interactive">
            <div id="items-row"><span class="label">道具</span><div id="item-slots"></div></div>
            <div id="cards-row"><span class="label">卡牌</span><div id="card-slots"></div></div>
            <button id="btn-draw">💰 抽 卡 💰<br><small>💰20</small></button>
        </div>

        <!-- Talent Panel -->
        <div id="talent-panel" class="ui-interactive panel-overlay" style="display:none">
            <div class="panel-box"><h3>🌟 选择天赋 (每杀敌获得)</h3><div id="talent-choices"></div></div>
        </div>

        <!-- Cultivation Panel -->
        <div id="cultivation-panel" class="ui-interactive panel-overlay" style="display:none">
            <div class="panel-box"><div id="cultivation-content"></div></div>
        </div>

        <!-- Blueprint Panel -->
        <div id="blueprint-panel" class="ui-interactive panel-overlay" style="display:none">
            <div class="panel-box" style="position:relative">
                <button id="btn-close-blueprint">✕</button>
                <h3>📋 蓝图</h3>
                <div id="blueprint-content"></div>
            </div>
        </div>

        <!-- Game Over Panel -->
        <div id="gameover-panel" class="ui-interactive panel-overlay" style="display:none">
            <div class="panel-box">
                <div id="gameover-content"></div>
                <button id="btn-retry">🔄 再来一局</button>
            </div>
        </div>
    </div>
</div>

<!-- ===== Engine (from parent public-v5) ===== -->
<script src="../public-v5/engine/engine-core.js"></script>
<script src="../public-v5/engine/engine-input.js"></script>
<script src="../public-v5/engine/engine-audio.js"></script>
<script src="../public-v5/engine/engine-render.js"></script>

<!-- Game Data -->
<script src="../public-v5/gamedata/game-data.js"></script>
<script src="../public-v5/gamedata/game-state.js"></script>

<!-- Game Logic -->
<script src="../public-v5/logic/game-loop.js"></script>
<script src="../public-v5/logic/game-combat.js"></script>
<script src="../public-v5/logic/game-waves.js"></script>
<script src="../public-v5/logic/game-cards.js"></script>
<script src="../public-v5/logic/game-items.js"></script>
<script src="../public-v5/logic/game-talents.js"></script>
<script src="../public-v5/logic/game-heroes.js"></script>

<!-- Canvas UI (hidden behind DOM overlay, render boss items) -->
<script src="../public-v5/ui/game-ui.js"></script>
<script src="../public-v5/ui/game-render.js"></script>

<!-- Entry -->
<script src="../public-v5/game-main.js"></script>

<!-- DOM Overlay Script -->
<script src="overlay-v1.js"></script>

<script>
(function(){
    'use strict';
    var selectedDiff = 'n5';
    var selectedHero = 'immortal';

    var diffGrid = document.getElementById('diff-grid');
    var diffNames = ['简单','较','普通','稍难','标准','困难','噩梦','深渊','地狱','不可能'];
    var diffColors = ['🟢','🟢','🟡','🟡','🟠','🟠','🔴','🔴','🟣','💀'];
    for (var i = 1; i <= 10; i++) {
        (function(n){
            var btn = document.createElement('div');
            btn.className = 'diff-btn' + (n === 5 ? ' selected' : '');
            btn.textContent = diffColors[n-1] + ' ' + diffNames[n-1];
            btn.addEventListener('click', function(){
                document.querySelectorAll('.diff-btn').forEach(function(b){b.classList.remove('selected')});
                btn.classList.add('selected');
                selectedDiff = 'n' + n;
            });
            diffGrid.appendChild(btn);
        })(i);
    }

    var heroGrid = document.getElementById('hero-grid');
    Object.keys(HEROES).forEach(function(key){
        var h = HEROES[key];
        var card = document.createElement('div');
        card.className = 'hero-card' + (key === 'immortal' ? ' selected' : '');
        card.innerHTML = '<div class="hero-card-icon">' + h.icon + '</div>' +
            '<div class="hero-card-name" style="color:' + h.color + '">' + h.name + '</div>' +
            '<div class="hero-card-type">' + (h.type === 'precision' ? '🎯精准射击' : '⚡自由射击') + '</div>' +
            '<div class="hero-card-desc">' + h.desc + '</div>';
        card.addEventListener('click', function(){
            document.querySelectorAll('.hero-card').forEach(function(c){c.classList.remove('selected')});
            card.classList.add('selected');
            selectedHero = key;
            document.getElementById('start-btn').disabled = false;
            document.getElementById('start-btn').textContent = '⚔️ 选择 ' + h.name + ' 开始';
        });
        heroGrid.appendChild(card);
    });

    (function(){
        var sel = document.querySelector('.hero-card.selected');
        if (sel) {
            document.getElementById('start-btn').disabled = false;
            var nameEl = sel.querySelector('.hero-card-name');
            document.getElementById('start-btn').textContent = '⚔️ 选择 ' + (nameEl ? nameEl.textContent : '英雄') + ' 开始';
        }
    })();

    document.getElementById('start-btn').addEventListener('click', function(){
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('game-container').classList.add('active');
        gameMain();
        gameStart(selectedDiff, selectedHero);
    });
})();
</script>

</body>
</html>
